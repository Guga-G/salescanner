<!doctype html>
<html lang="en">
<head><title>Rule 1 Charged Creatine</title></head>
<body>
  <div class="product-view">
    <div class="product-title-wrap">
      <h1 class="product-title" itemprop="name">
        Rule 1 Charged Creatine            </h1>
    </div>
    <div class="product-info">
      <span class="brand" itemprop="brand">Rule 1</span>
    </div>

    <div class="product-shop">
      <form id="product_addtocart_form" method="post">
        <div class="group-wrap">
          <div class="group">
            <div class="group-header">
              <div class="cost">
                <span class="calc">
                  <span class="old-price">
                    <span class="price">$39.99</span>
                  </span>
                  <span class="special-price">
                    <span class="price">$29.99</span>
                  </span>
                </span>
              </div>
              <div class="title">30 Servings</div>
              <div class="deal">
                <span class="mns-label lbl-deal">Price Cut</span>
              </div>
            </div>
            <div class="deals-coupons-section">
              <div class="deal-info-wrap">
                <div><span class="deal-label">25% Off - Limited time only</span></div>
                <div class="deal-desc">Save 25% on Rule 1 Charged Creatine while it lasts.</div>
              </div>
            </div>
            <div class="fields">
              <span itemscope itemprop="offers" itemtype="http://schema.org/Offer">
                <meta itemprop="sku" content="ROP0381" />
                <link itemprop="availability" href="http://schema.org/InStock" />
                <meta itemprop="priceCurrency" content="USD" />
                <meta itemprop="price" content="29.99" />
              </span>
              <button class="btn btn-cart add-to-cart" type="submit">Add to Cart</button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
